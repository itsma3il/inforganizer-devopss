---
# Ansible playbook — configure nodes, bootstrap k3s, and enable GitOps (ArgoCD)
#
# Usage (run from project root after terraform apply):
#   export POSTGRES_PASSWORD="a-strong-random-password"
#   export JWT_SECRET="a-strong-random-secret"
#   ansible-playbook -i ansible/inventory.ini ansible/install_k3s.yml
#
# Secrets can also be passed inline:
#   POSTGRES_PASSWORD=xxx JWT_SECRET=xxx ansible-playbook ...
###############################################################################

- name: Common setup for all nodes
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - awscli
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Check if /swapfile exists
      stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 2GB swapfile
      command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: Set swapfile permissions
      file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"

    - name: Initialize swap area on new swapfile
      command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Persist swapfile in fstab
      mount:
        name: none
        src: /swapfile
        fstype: swap
        opts: sw
        state: present

    - name: Check active swap devices
      command: swapon --show=NAME --noheadings
      register: active_swaps
      changed_when: false

    - name: Enable swapfile
      command: swapon /swapfile
      when: active_swaps.stdout is not search('/swapfile')

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

- name: Install k3s on master node
  hosts: master
  become: true

  tasks:
    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik --kubelet-arg=fail-swap-on=false" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      retries: 10
      delay: 10
      register: result
      until: result.rc == 0

    - name: Fetch k3s node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Store master IP and token as facts
      set_fact:
        k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"
        # Use private network IP so worker joins over VPC/SG internal traffic.
        master_ip: "{{ ansible_default_ipv4.address | default(ansible_host | default(inventory_hostname)) }}"

- name: Install k3s agent on worker nodes
  hosts: workers
  become: true

  tasks:
    - name: Install k3s agent and join cluster
      shell: |
        curl -sfL https://get.k3s.io | \
          sh -
      environment:
        INSTALL_K3S_EXEC: "agent --kubelet-arg=fail-swap-on=false"
        K3S_URL: "https://{{ hostvars[groups['master'][0]].master_ip | default(hostvars[groups['master'][0]].ansible_host | default(groups['master'][0])) }}:6443"
        K3S_TOKEN: "{{ hostvars[groups['master'][0]].k3s_token }}"
      args:
        creates: /usr/local/bin/k3s
        executable: /bin/bash

- name: Wait for cluster to stabilize
  hosts: master
  become: true

  tasks:
    - name: Wait for all nodes to be ready
      command: k3s kubectl wait --for=condition=Ready node --all --timeout=300s
      retries: 5
      delay: 15
      register: result
      until: result.rc == 0

    - name: Wait for core system pods (coredns, etc) to be running
      command: k3s kubectl wait --for=condition=ready pod -l k8s-app=kube-dns -n kube-system --timeout=120s
      retries: 3
      delay: 10
      ignore_errors: true

    - name: Final API server connectivity check
      command: k3s kubectl cluster-info
      retries: 5
      delay: 10
      register: result
      until: result.rc == 0

- name: Bootstrap ArgoCD GitOps on Kubernetes
  hosts: master
  become: true

  vars:
    # Read from the environment of the Ansible control node.
    # These stay outside Git and are applied as a runtime K8s Secret.
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    ecr_account_id: "{{ lookup('env', 'AWS_ACCOUNT_ID') | default('883999922093', true) }}"
    ecr_region: "eu-west-3"
    ecr_registry: "{{ ecr_account_id }}.dkr.ecr.{{ ecr_region }}.amazonaws.com"

  tasks:
    - name: Validate required secrets are set
      assert:
        that:
          - postgres_password | length > 0
          - jwt_secret | length > 0
        fail_msg: >
          POSTGRES_PASSWORD and JWT_SECRET must be set as environment variables
          before running this playbook (e.g. export POSTGRES_PASSWORD=xxx).

    - name: Render runtime postgres secret manifest on master
      template:
        src: templates/postgres-secret.yaml.j2
        dest: /tmp/postgres-secret.yaml
        mode: "0600"

    - name: Apply runtime postgres secret
      command: k3s kubectl apply -f /tmp/postgres-secret.yaml
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Get ECR login password from control node
      command: aws ecr get-login-password --region {{ ecr_region }}
      delegate_to: localhost
      become: false
      run_once: true
      register: ecr_password_cmd
      no_log: true
      changed_when: false

    - name: Create or refresh ecr-creds secret
      shell: |
        set -e
        k3s kubectl create secret docker-registry ecr-creds \
          --docker-server="{{ ecr_registry }}" \
          --docker-username="AWS" \
          --docker-password="{{ ecr_password_cmd.stdout | trim }}" \
          --dry-run=client -o yaml | k3s kubectl apply -f -
      retries: 3
      delay: 10
      register: result
      no_log: true
      until: result.rc == 0

    - name: Install ecr-creds refresh script on master
      copy:
        dest: /usr/local/bin/refresh-ecr-creds.sh
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          ECR_PASSWORD="$(aws ecr get-login-password --region {{ ecr_region }})"
          k3s kubectl create secret docker-registry ecr-creds \
            --docker-server="{{ ecr_registry }}" \
            --docker-username="AWS" \
            --docker-password="${ECR_PASSWORD}" \
            --dry-run=client -o yaml | k3s kubectl apply -f -

    - name: Configure AWS credentials for periodic ECR refresh script
      copy:
        dest: /root/.aws/credentials
        mode: "0600"
        content: |
          [default]
          aws_access_key_id={{ lookup('env', 'AWS_ACCESS_KEY_ID') }}
          aws_secret_access_key={{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}
          {% if lookup('env', 'AWS_SESSION_TOKEN') | length > 0 %}
          aws_session_token={{ lookup('env', 'AWS_SESSION_TOKEN') }}
          {% endif %}
      when:
        - lookup('env', 'AWS_ACCESS_KEY_ID') | length > 0
        - lookup('env', 'AWS_SECRET_ACCESS_KEY') | length > 0
      no_log: true

    - name: Ensure periodic ecr-creds refresh cron is present
      cron:
        name: refresh ecr-creds secret for k3s
        minute: "0"
        hour: "*/6"
        user: root
        job: "/usr/local/bin/refresh-ecr-creds.sh >/var/log/refresh-ecr-creds.log 2>&1"

    - name: Create argocd namespace
      command: k3s kubectl create namespace argocd
      register: create_argocd_ns
      changed_when: create_argocd_ns.rc == 0
      failed_when: create_argocd_ns.rc != 0 and 'AlreadyExists' not in create_argocd_ns.stderr

    - name: Download ArgoCD install manifest on master
      get_url:
        url: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
        dest: /tmp/argocd-install.yaml
        mode: "0644"
      retries: 3
      delay: 5
      register: argocd_manifest_download
      until: argocd_manifest_download is succeeded

    - name: Install ArgoCD components with retry/fallback
      block:
        - name: Apply ArgoCD install manifest (client-side apply)
          command: k3s kubectl apply -n argocd --request-timeout=600s -f /tmp/argocd-install.yaml
          retries: 5
          delay: 20
          register: argocd_apply_client
          until: argocd_apply_client.rc == 0
      rescue:
        - name: Apply ArgoCD install manifest (server-side fallback)
          command: >
            k3s kubectl apply --server-side --force-conflicts
            -n argocd --request-timeout=600s -f /tmp/argocd-install.yaml
          retries: 5
          delay: 20
          register: argocd_apply_server
          until: argocd_apply_server.rc == 0

    - name: Wait for ArgoCD server to be ready
      command: k3s kubectl rollout status deployment/argocd-server -n argocd --timeout=300s
      retries: 3
      delay: 15
      register: result
      until: result.rc == 0

    - name: Copy ArgoCD application manifest to master
      copy:
        src: ../argocd/inforganizer-app.yaml
        dest: /tmp/inforganizer-app.yaml

    - name: Apply ArgoCD application
      command: k3s kubectl apply -f /tmp/inforganizer-app.yaml
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Trigger initial ArgoCD sync by annotating app
      command: >
        k3s kubectl annotate application inforganizer -n argocd
        argocd.argoproj.io/refresh=hard --overwrite
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Print app URL
      debug:
        msg: >
          GitOps is active. ArgoCD will reconcile from GitHub and Inforganizer is exposed at
          http://{{ ansible_host | default(inventory_hostname) }}:30080
