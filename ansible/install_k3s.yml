---
###############################################################################
# Ansible playbook — configure nodes and deploy Inforganizer on k3s
#
# Usage (run from project root after terraform apply):
#   export POSTGRES_PASSWORD="a-strong-random-password"
#   export JWT_SECRET="a-strong-random-secret"
#   ansible-playbook -i ansible/inventory.ini ansible/install_k3s.yml
#
# Secrets can also be passed inline:
#   POSTGRES_PASSWORD=xxx JWT_SECRET=xxx ansible-playbook ...
###############################################################################

- name: Common setup for all nodes
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
          - gettext-base # provides envsubst — used to inject secrets into postgres.yaml
        state: present

    - name: Disable swap (required by Kubernetes)
      command: swapoff -a
      changed_when: false

    - name: Remove swap entry from /etc/fstab
      lineinfile:
        path: /etc/fstab
        regexp: '^\s*[^#].*\sswap\s'
        state: absent

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

- name: Install k3s on master node
  hosts: master
  become: true

  tasks:
    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      retries: 10
      delay: 10
      register: result
      until: result.rc == 0

    - name: Fetch k3s node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Store master IP and token as facts
      set_fact:
        k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"
        master_ip: "{{ ansible_host | default(inventory_hostname) }}"

- name: Install k3s agent on worker nodes
  hosts: workers
  become: true

  tasks:
    - name: Install k3s agent and join cluster
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL=https://{{ hostvars[groups['master'][0]].master_ip | default(hostvars[groups['master'][0]].ansible_host | default(groups['master'][0])) }}:6443 \
          K3S_TOKEN={{ hostvars[groups['master'][0]].k3s_token }} \
          sh -
      args:
        creates: /usr/local/bin/k3s

- name: Wait for cluster to stabilize
  hosts: master
  become: true

  tasks:
    - name: Wait for all nodes to be ready
      command: k3s kubectl wait --for=condition=Ready node --all --timeout=300s
      retries: 5
      delay: 15
      register: result
      until: result.rc == 0

    - name: Wait for core system pods (coredns, etc) to be running
      command: k3s kubectl wait --for=condition=ready pod -l k8s-app=kube-dns -n kube-system --timeout=120s
      retries: 3
      delay: 10
      ignore_errors: true

    - name: Final API server connectivity check
      command: k3s kubectl cluster-info
      retries: 5
      delay: 10
      register: result
      until: result.rc == 0

- name: Deploy Inforganizer to Kubernetes
  hosts: master
  become: true

  vars:
    # Read from the environment of the Ansible control node.
    # Set POSTGRES_PASSWORD and JWT_SECRET before running this playbook.
    postgres_password: "{{ lookup('env', 'POSTGRES_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"

  tasks:
    - name: Validate required secrets are set
      assert:
        that:
          - postgres_password | length > 0
          - jwt_secret | length > 0
        fail_msg: >
          POSTGRES_PASSWORD and JWT_SECRET must be set as environment variables
          before running this playbook (e.g. export POSTGRES_PASSWORD=xxx).

    - name: Copy Kubernetes manifests to master
      copy:
        src: "{{ item }}"
        dest: /tmp/
      loop:
        - ../k8s/pvc.yaml
        - ../k8s/postgres.yaml
        - ../k8s/deployment.yaml
        - ../k8s/service.yaml

    - name: Apply PVC (PostgreSQL storage)
      command: k3s kubectl apply -f /tmp/pvc.yaml
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Apply PostgreSQL (Secret, Deployment, Service)
      shell: envsubst < /tmp/postgres.yaml | k3s kubectl apply -f -
      environment:
        POSTGRES_PASSWORD: "{{ postgres_password }}"
        JWT_SECRET: "{{ jwt_secret }}"
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Wait for PostgreSQL to be ready
      command: k3s kubectl rollout status deployment/postgres --timeout=120s
      retries: 2
      delay: 15
      register: result
      until: result.rc == 0

    - name: Apply App Deployment
      command: k3s kubectl apply -f /tmp/deployment.yaml
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Apply App Service
      command: k3s kubectl apply -f /tmp/service.yaml
      retries: 3
      delay: 10
      register: result
      until: result.rc == 0

    - name: Wait for deployment to be ready
      command: k3s kubectl rollout status deployment/inforganizer --timeout=120s
      retries: 2
      delay: 15
      register: result
      until: result.rc == 0

    - name: Print app URL
      debug:
        msg: "Inforganizer is accessible at http://{{ ansible_host | default(inventory_hostname) }}:30080"
