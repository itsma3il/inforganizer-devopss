###############################################################################
# GitHub Actions CI/CD pipeline for Inforganizer
#
# Triggers: push to main, pull_request to main
#
# Jobs:
#   1. test        — install deps & run API tests
#   2. build-push  — build Docker image and push to ghcr.io  (main only)
#   3. deploy      — SSH into EC2 master, pull new image & rollout  (main only)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   AWS_MASTER_IP   — Public IP of the EC2 master node (terraform output)
#   SSH_PRIVATE_KEY — PEM content of the EC2 key pair (~/.ssh/<key>.pem)
#
# GITHUB_TOKEN is provided automatically — no action needed.
###############################################################################

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/inforganizer

jobs:
  # ─── 1. Test ───────────────────────────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Run API tests
        run: pnpm test

  # ─── 2. Build & Push Docker image ─────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on direct pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    ./Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 3. Deploy to AWS EC2 k3s cluster ─────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy — rollout restart on master node
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.AWS_MASTER_IP }}
          username: ubuntu
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          timeout:  60s
          script: |
            sudo k3s kubectl rollout restart deployment/inforganizer
            sudo k3s kubectl rollout status  deployment/inforganizer --timeout=120s
