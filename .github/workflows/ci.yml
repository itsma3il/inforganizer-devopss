###############################################################################
# GitHub Actions CI/CD pipeline for Inforganizer
#
# Triggers: push to main, pull_request to main
#
# Jobs:
#   1. test        — install deps & run API tests
#   2. build-push  — build Docker image and push to ghcr.io  (main only)
#   3. deploy      — SSH into EC2 master, pull new image & rollout  (main only)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   AWS_MASTER_IP     — Public IP of the EC2 master node (terraform output)
#   SSH_PRIVATE_KEY   — PEM content of the EC2 key pair (~/.ssh/<key>.pem)
#   POSTGRES_PASSWORD — Postgres password (used when re-applying the K8s secret)
#   JWT_SECRET        — JWT signing secret (used when re-applying the K8s secret)
#
# GITHUB_TOKEN is provided automatically — no action needed.
###############################################################################
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: inforganizer
  ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}

jobs:
  test:
    name: Install and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inforganizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inforganizer_test
      JWT_SECRET: test-secret-for-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-push-ecr:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "image_tag=latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -t "${IMAGE_URI}:${{ steps.vars.outputs.image_tag }}" -t "${IMAGE_URI}:latest" .
          docker push "${IMAGE_URI}:${{ steps.vars.outputs.image_tag }}"
          docker push "${IMAGE_URI}:latest"

  deploy-k3s:
    name: Deploy to k3s on AWS
    runs-on: ubuntu-latest
    needs: build-push-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG: ${{ needs.build-push-ecr.outputs.image_tag }}

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch ECR password
        id: ecr
        run: |
          ECR_PASSWORD="$(aws ecr get-login-password --region "${AWS_REGION}")"
          echo "password=${ECR_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_PASSWORD: ${{ steps.ecr.outputs.password }}
          IMAGE_URI: ${{ env.IMAGE_URI }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        with:
          host: ${{ secrets.AWS_MASTER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 360s
          envs: ECR_PASSWORD,IMAGE_URI,IMAGE_TAG,ACCOUNT_ID,AWS_REGION
          script: |
            set -e

            sudo k3s kubectl create secret docker-registry ecr-creds \
              --docker-server="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" \
              --docker-username="AWS" \
              --docker-password="${ECR_PASSWORD}" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            sudo k3s kubectl set image deployment/inforganizer \
              inforganizer="${IMAGE_URI}:${IMAGE_TAG}"

            sudo k3s kubectl rollout status deployment/inforganizer --timeout=300s
            sudo k3s kubectl get pods -l app=inforganizer -o wide
