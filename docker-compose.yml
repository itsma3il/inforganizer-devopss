version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inforganizer:local
    container_name: inforganizer
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DB_PATH=/data/inforganizer.db
    volumes:
      - inforganizer_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  inforganizer_data:
    driver: local
